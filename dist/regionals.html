<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Explorer - REBUILT 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="page-body" x-data="regionalsApp">
    <nav class="top-nav">
        <div class="top-nav__inner">
            <div class="top-nav__left">
                <button @click="location.href='dashboard.html'" class="back-btn--shadow">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="top-nav__center">
                <img src="img/logo.png" alt="Logo" class="brand__logo--nav">
                <span class="brand__subtitle--orange">Laissez Faire</span>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <h1 class="page-hero__title">Regional Explorer</h1>
    </section>

    <div class="filter-panel px-4 mb-6">
        <div class="filter-group col-span-full">
            <label class="form-label--filter uppercase tracking-widest text-[10px] text-slate-500 font-black">Search
                Regionals</label>
            <div class="relative">
                <input x-model="searchQuery" type="text" placeholder="Search by name or key (e.g. Istanbul)..."
                    class="form-input--search pl-10">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </div>

    <div class="match-grid">
        <template x-for="event in filteredRegionals" :key="event.key">
            <div class="match-card-new"
                :class="expandedRegionals.includes(event.key) ? 'ring-2 ring-orange-500/50' : ''">
                <div @click="toggleRegional(event.key)" class="match-card__header cursor-pointer">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-orange-500 font-black uppercase tracking-widest"
                            x-text="event.season"></span>
                        <span class="font-black text-white text-lg leading-tight" x-text="event.name"></span>
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider"
                            x-text="event.key"></span>
                    </div>
                    <svg class="match-card__chevron transition-transform duration-300"
                        :class="expandedRegionals.includes(event.key) ? 'rotate-180' : ''" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </div>

                <div x-show="expandedRegionals.includes(event.key)" x-collapse class="match-expanded">
                    <template x-if="regionalData[event.key]?.loading">
                        <div class="p-8 flex flex-col items-center justify-center space-y-3">
                            <div class="loading-spinner"></div>
                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-[0.3em]">Syncing
                                Regional Intel...</p>
                        </div>
                    </template>

                    <template x-if="!regionalData[event.key]?.loading">
                        <div x-data="{ tab: 'matches' }">
                            <!-- Team Search Bar Inside Regional -->
                            <div class="px-4 py-3 bg-slate-900/80 border-b border-slate-800 flex items-center gap-3">
                                <div class="relative flex-1">
                                    <input x-model="teamSearchQuery" type="text"
                                        placeholder="Search team # or name in this regional..."
                                        class="w-full bg-slate-950 border border-slate-800 rounded-lg py-1.5 pl-8 pr-3 text-[10px] text-white focus:outline-none focus:border-orange-500/50 transition-all">
                                    <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-slate-500"
                                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </div>
                            </div>

                            <div class="flex border-b border-slate-800 bg-slate-900/50">
                                <button @click="tab = 'matches'"
                                    :class="tab === 'matches' ? 'border-orange-500 text-orange-500 bg-orange-500/5' : 'border-transparent text-slate-500'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 transition-all">Matches</button>
                                <button @click="tab = 'rankings'"
                                    :class="tab === 'rankings' ? 'border-orange-500 text-orange-500 bg-orange-500/5' : 'border-transparent text-slate-500'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 transition-all">Rankings</button>
                                <button @click="tab = 'prizes'"
                                    :class="tab === 'prizes' ? 'border-orange-500 text-orange-500 bg-orange-500/5' : 'border-transparent text-slate-500'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 transition-all">Prizes</button>
                            </div>

                            <!-- Matches Section -->
                            <div x-show="tab === 'matches'" class="p-2 space-y-2">
                                <template x-for="match in getFilteredMatches(event.key)"
                                    :key="match.matchNumber + match.compLevel">
                                    <div class="bg-slate-800/20 border border-slate-700/30 rounded-lg overflow-hidden">
                                        <div @click="toggleMatch(event.key + match.compLevel + match.matchNumber)"
                                            class="p-3 flex items-center justify-between cursor-pointer hover:bg-slate-800/40 transition-colors">
                                            <div class="flex items-center gap-3">
                                                <div class="flex flex-col">
                                                    <span class="text-[10px] font-black text-orange-500 uppercase"
                                                        x-text="match.description"></span>
                                                    <span class="text-[9px] text-slate-500 font-bold"
                                                        x-text="match.actualStartTime ? formatDate(match.actualStartTime) : (match.scheduledTime ? 'Scheduled: ' + formatDate(match.scheduledTime) : 'Pending')"></span>
                                                </div>
                                            </div>
                                            <div class="flex items-center gap-4">
                                                <template x-if="match.actualStartTime">
                                                    <div
                                                        class="flex items-center gap-2 px-2 py-1 bg-slate-900/50 rounded border border-slate-700/50">
                                                        <span class="text-[11px] font-black text-red-500"
                                                            x-text="match.scoreRedFinal || 0"></span>
                                                        <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
                                                        <span class="text-[11px] font-black text-blue-500"
                                                            x-text="match.scoreBlueFinal || 0"></span>
                                                    </div>
                                                </template>
                                                <template x-if="!match.actualStartTime">
                                                    <span
                                                        class="text-[9px] text-slate-600 font-black uppercase tracking-widest italic"
                                                        x-text="match.scheduledTime ? 'Upcoming' : 'Pending'"></span>
                                                </template>
                                                <svg class="w-3 h-3 text-slate-600 transition-transform"
                                                    :class="expandedMatches.includes(event.key + match.compLevel + match.matchNumber) ? 'rotate-180' : ''"
                                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="3" d="M19 9l-7 7-7-7"></path>
                                                </svg>
                                            </div>
                                        </div>
                                        <!-- Expand Match -->
                                        <div x-show="expandedMatches.includes(event.key + match.compLevel + match.matchNumber)"
                                            x-collapse
                                            class="p-4 border-t border-slate-800/80 bg-slate-900/40 space-y-4">

                                            <!-- Alliance Teams -->
                                            <div class="grid grid-cols-2 gap-4 text-center">
                                                <div class="space-y-2">
                                                    <span
                                                        class="text-[9px] font-black text-red-500 uppercase tracking-widest border-b border-red-500/20 pb-1 block">Red
                                                        Alliance</span>
                                                    <template
                                                        x-for="t in match.teams.filter(t => t.station.startsWith('Red'))">
                                                        <div @click.stop="location.href='teams.html?team=' + t.teamNumber"
                                                            class="text-[10px] text-white font-bold bg-red-500/5 py-1 px-2 rounded border border-red-500/10 cursor-pointer hover:bg-red-500/20 transition-all"
                                                            :class="isHighlighted(t.teamNumber) ? 'ring-2 ring-red-500 bg-red-500/30' : ''"
                                                            x-text="'#' + t.teamNumber"></div>
                                                    </template>
                                                </div>
                                                <div class="space-y-2">
                                                    <span
                                                        class="text-[9px] font-black text-blue-500 uppercase tracking-widest border-b border-blue-500/20 pb-1 block">Blue
                                                        Alliance</span>
                                                    <template
                                                        x-for="t in match.teams.filter(t => t.station.startsWith('Blue'))">
                                                        <div @click.stop="location.href='teams.html?team=' + t.teamNumber"
                                                            class="text-[10px] text-white font-bold bg-blue-500/5 py-1 px-2 rounded border border-blue-500/10 cursor-pointer hover:bg-blue-500/20 transition-all"
                                                            :class="isHighlighted(t.teamNumber) ? 'ring-2 ring-blue-500 bg-blue-500/30' : ''"
                                                            x-text="'#' + t.teamNumber"></div>
                                                    </template>
                                                </div>
                                            </div>

                                            <div class="flex gap-2">
                                                <a :href="`scout.html?season=${event.season}&regional=${event.key}&type=${match.compLevel === 'qm' ? 'Qualification' : (match.compLevel === 'p' ? 'Practice' : (match.compLevel === 'f' ? 'Finals' : 'Playoffs'))}&match=${match.matchNumber}`"
                                                    class="flex-1 py-1.5 bg-orange-600 hover:bg-orange-500 text-white rounded text-[10px] font-black uppercase flex items-center justify-center gap-2 shadow-lg shadow-orange-900/20 transition-all">
                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor"
                                                        viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="3"
                                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                                        </path>
                                                    </svg>
                                                    Scout Match
                                                </a>
                                                <a :href="FRC_CONFIG.getTbaMatchUrl(event.key, match.compLevel === 'qm' ? 'Qualification' : (match.compLevel === 'p' ? 'Practice' : (match.compLevel === 'f' ? 'Finals' : 'Playoffs')), match.matchNumber)"
                                                    target="_blank"
                                                    class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded text-[10px] font-black uppercase flex items-center justify-center gap-2">
                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor"
                                                        viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14">
                                                        </path>
                                                    </svg>
                                                    TBA
                                                </a>
                                            </div>

                                            <!-- Score Breakdown Section -->
                                            <template x-if="match.rawScoreBreakdown">
                                                <div class="mt-4 pt-4 border-t border-slate-800 grid grid-cols-2 gap-3">
                                                    <template x-for="alliance in ['red', 'blue']">
                                                        <div :class="alliance === 'red' ? 'bg-red-500/5 border-red-500/10' : 'bg-blue-500/5 border-blue-500/10'"
                                                            class="rounded border p-2 space-y-1.5">
                                                            <div class="flex justify-between items-center text-[8px] font-black uppercase"
                                                                :class="alliance === 'red' ? 'text-red-400' : 'text-blue-400'">
                                                                <span x-text="alliance + ' BREAKDOWN'"></span>
                                                                <span class="text-white"
                                                                    x-text="match['score' + (alliance.charAt(0).toUpperCase() + alliance.slice(1)) + 'Final']"></span>
                                                            </div>
                                                            <div class="space-y-1">
                                                                <div
                                                                    class="flex justify-between text-[7px] font-bold text-slate-500">
                                                                    <span>AUTO</span>
                                                                    <span class="text-white"
                                                                        x-text="match.rawScoreBreakdown[alliance].totalAutoPoints || 0"></span>
                                                                </div>
                                                                <div
                                                                    class="flex justify-between text-[7px] font-bold text-slate-500">
                                                                    <span>TELEOP</span>
                                                                    <span class="text-white"
                                                                        x-text="match.rawScoreBreakdown[alliance].totalTeleopPoints || 0"></span>
                                                                </div>
                                                                <div
                                                                    class="flex justify-between text-[7px] font-bold text-slate-500">
                                                                    <span>TOWER</span>
                                                                    <span class="text-white"
                                                                        x-text="match.rawScoreBreakdown[alliance].totalTowerPoints || 0"></span>
                                                                </div>
                                                                <div
                                                                    class="flex justify-between text-[7px] font-bold text-slate-500 border-t border-white/5 pt-1">
                                                                    <span>RP</span>
                                                                    <span class="text-orange-500"
                                                                        x-text="match.rawScoreBreakdown[alliance].rp || 0"></span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Rankings Section -->
                            <div x-show="tab === 'rankings'" class="p-1.5 space-y-1.5">
                                <div
                                    class="grid grid-cols-12 px-3 py-2 text-[8px] font-black text-slate-600 uppercase tracking-wider">
                                    <div class="col-span-1">RK</div>
                                    <div class="col-span-3">Team</div>
                                    <div class="col-span-2 text-right">W-L-T</div>
                                    <div class="col-span-2 text-right">Ranking P.</div>
                                    <div class="col-span-2 text-right">Avg Match</div>
                                    <div class="col-span-2 text-right">Score</div>
                                </div>
                                <template x-for="rank in getFilteredRankings(event.key)" :key="rank.team_key">
                                    <div class="bg-slate-800/20 border border-slate-700/30 rounded-lg overflow-hidden">
                                        <div @click="toggleTeam(parseInt(rank.team_key.replace('frc','')), event.key)"
                                            class="p-3 grid grid-cols-12 items-center cursor-pointer hover:bg-slate-800/40 transition-colors">
                                            <div class="col-span-1 text-xs font-black text-orange-500"
                                                x-text="rank.rank"></div>
                                            <div class="col-span-3 flex flex-col">
                                                <span class="text-[10px] font-black text-white"
                                                    :class="isHighlighted(parseInt(rank.team_key.replace('frc',''))) ? 'bg-orange-500/20 px-1 rounded' : ''"
                                                    x-text="'#' + rank.team_key.replace('frc','')"></span>
                                                <span class="text-[8px] text-slate-500 font-bold uppercase truncate"
                                                    x-text="regionalData[event.key].teams.find(t => t.teamNumber === parseInt(rank.team_key.replace('frc','')))?.name"></span>
                                            </div>
                                            <div class="col-span-2 text-right">
                                                <span class="text-[9px] text-slate-400 font-bold"
                                                    x-text="rank.record ? `${rank.record.wins}-${rank.record.losses}-${rank.record.ties}` : '0-0-0'"></span>
                                            </div>
                                            <div class="col-span-2 text-right font-black text-white text-[10px]"
                                                x-text="getRankData(rank, 'Ranking Points', event.key)"></div>
                                            <div class="col-span-2 text-right font-black text-white text-[10px]"
                                                x-text="getRankData(rank, 'Avg Match', event.key)"></div>
                                            <div class="col-span-2 text-right font-black text-white text-[10px]"
                                                x-text="getRankData(rank, 'Ranking Score', event.key)"></div>
                                        </div>
                                        <!-- Expand Team Detail -->
                                        <div x-show="expandedTeams.includes(event.key + '_' + parseInt(rank.team_key.replace('frc','')))"
                                            x-collapse class="p-4 bg-slate-900/60 border-t border-slate-800 space-y-6">
                                            <!-- Pit Scouts For SEASON -->
                                            <div class="space-y-4">
                                                <div
                                                    class="flex items-center justify-between border-b border-orange-500/20 pb-2">
                                                    <h4
                                                        class="text-[9px] font-black uppercase tracking-[0.2em] text-orange-500">
                                                        Pit Reports (Season-Wide)</h4>
                                                    <span class="text-[8px] text-slate-500 font-bold"
                                                        x-text="(pitReports[parseInt(rank.team_key.replace('frc',''))] || []).length + ' reports found'"></span>
                                                </div>
                                                <div class="space-y-3">
                                                    <template
                                                        x-for="report in (pitReports[parseInt(rank.team_key.replace('frc',''))] || [])"
                                                        :key="report.id">
                                                        <div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700/50 hover:border-orange-500/30 transition-all cursor-pointer"
                                                            @click="togglePitReport(report.id)">
                                                            <div class="flex justify-between items-center mb-1">
                                                                <div class="flex items-center gap-2">
                                                                    <span class="text-[10px] font-black text-white"
                                                                        x-text="'Scouter Team #' + report.meta.scouterTeam"></span>
                                                                    <span
                                                                        class="text-[8px] bg-white/5 px-1.5 py-0.5 rounded text-orange-400 font-black uppercase tracking-tighter"
                                                                        x-text="report.regional"></span>
                                                                </div>
                                                                <span class="text-[9px] text-slate-500"
                                                                    x-text="formatDate(report.createdAt)"></span>
                                                            </div>
                                                            <div x-show="expandedPitReports.includes(report.id)"
                                                                x-collapse
                                                                class="mt-3 grid grid-cols-2 gap-x-6 gap-y-3 text-[9px] border-t border-slate-700/30 pt-3">
                                                                <div class="flex justify-between text-slate-400">
                                                                    <span>Drive:</span> <span
                                                                        class="text-white font-bold"
                                                                        x-text="report.data?.driveBase"></span>
                                                                </div>
                                                                <div class="flex justify-between text-slate-400">
                                                                    <span>Intake:</span> <span
                                                                        class="text-white font-bold"
                                                                        x-text="report.data?.intake"></span>
                                                                </div>
                                                                <div class="flex justify-between text-slate-400">
                                                                    <span>Shooter:</span> <span
                                                                        class="text-white font-bold"
                                                                        x-text="report.data?.shooter"></span>
                                                                </div>
                                                                <div class="flex justify-between text-slate-400">
                                                                    <span>Capacity:</span> <span
                                                                        class="text-white font-bold"
                                                                        x-text="report.data?.ballCapacity"></span>
                                                                </div>
                                                                <div class="col-span-2 flex flex-col gap-1 mt-1">
                                                                    <span
                                                                        class="text-slate-500 uppercase tracking-widest text-[8px]">Comments:</span>
                                                                    <p class="text-slate-300 italic leading-tight"
                                                                        x-text="report.data?.generalComments || 'No comments'">
                                                                    </p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </template>
                                                    <template
                                                        x-if="!(pitReports[parseInt(rank.team_key.replace('frc',''))] || []).length">
                                                        <div
                                                            class="py-12 flex flex-col items-center justify-center opacity-40">
                                                            <svg class="h-8 w-8 text-slate-600 mb-2" fill="none"
                                                                stroke="currentColor" viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                                    stroke-width="2"
                                                                    d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a2 2 0 00-1.96 1.414l-.722 2.164a2 2 0 00.177 1.647l1.003 1.505a2 2 0 001.621.824h2.246a2 2 0 001.621-.824l1.003-1.505a2 2 0 00.177-1.647l-.722-2.164a2 2 0 00-1.022-1.071l-2.387-.477z">
                                                                </path>
                                                            </svg>
                                                            <p class="text-[10px] text-slate-600 italic">Zero scouting
                                                                reports available for this season.</p>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>

                                            <!-- Original Team Explorer Details -->
                                            <div class="space-y-3 pt-4 border-t border-slate-800">
                                                <h4
                                                    class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-500 border-l-2 border-slate-700 pl-3">
                                                    Official Honors</h4>
                                                <div class="flex flex-wrap gap-2">
                                                    <template
                                                        x-for="award in (regionalData[event.key].teams.find(t => t.teamNumber === parseInt(rank.team_key.replace('frc','')))?.awards || [])">
                                                        <div
                                                            class="flex flex-col bg-white/5 px-2 py-1.5 rounded border border-white/5">
                                                            <span class="text-[9px] font-black text-orange-400"
                                                                x-text="award.name"></span>
                                                            <span class="text-[8px] text-slate-500 font-bold"
                                                                x-text="award.event_key + ' (' + award.year + ')'"></span>
                                                        </div>
                                                    </template>
                                                    <template
                                                        x-if="!(regionalData[event.key].teams.find(t => t.teamNumber === parseInt(rank.team_key.replace('frc','')))?.awards?.length)">
                                                        <span class="text-[9px] text-slate-700 italic">No official
                                                            honors on file.</span>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Prizes Section -->
                            <div x-show="tab === 'prizes'" class="p-3 space-y-3">
                                <template x-for="award in getFilteredAwards(event.key)">
                                    <div
                                        class="flex items-center justify-between p-3 bg-slate-800/20 border border-slate-700/30 rounded-lg group hover:border-orange-500/20 transition-all">
                                        <div class="flex flex-col flex-1 mr-4">
                                            <span class="text-[11px] font-black text-white leading-tight mb-1"
                                                x-text="award.name"></span>
                                            <span
                                                class="text-[8px] text-orange-500 font-black uppercase tracking-widest"
                                                x-text="award.event_key + ' | ' + award.year + ' SEASON'"></span>
                                        </div>
                                        <div class="flex flex-col items-end shrink-0">
                                            <template x-for="recipient in award.recipient_list">
                                                <div @click="location.href='teams.html?team=' + recipient.team_key?.replace('frc','')"
                                                    class="flex items-center gap-2 cursor-pointer hover:underline">
                                                    <span class="text-[10px] font-black text-orange-500"
                                                        x-text="'#' + (recipient.team_key?.replace('frc','') || 'Indiv.')"></span>
                                                    <span
                                                        class="text-[9px] text-slate-500 font-bold max-w-[100px] truncate"
                                                        x-text="recipient.awardee"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
